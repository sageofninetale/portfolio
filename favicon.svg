<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background with slight blue tint -->
  <rect width="32" height="32" rx="6" fill="#08080f"/>
  <!-- Outer orbit ring dashed, cyan -->
  <circle cx="16" cy="16" r="13" fill="none" stroke="#00d4ff" stroke-width="1.2" stroke-dasharray="5 3.5" stroke-linecap="round" opacity="0.55"/>
  <!-- Inner subtle glow ring -->
  <circle cx="16" cy="16" r="9" fill="none" stroke="rgba(0,212,255,0.18)" stroke-width="3"/>
  <!-- Bold A -->
  <text x="16" y="22" font-family="Arial Black, Impact, sans-serif" font-size="18" font-weight="900" fill="white" text-anchor="middle">A</text>
  <!-- Cyan accent dot below A -->
  <circle cx="16" cy="27" r="1.5" fill="#00d4ff" opacity="0.8"/>
</svg>
