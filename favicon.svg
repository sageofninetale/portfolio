<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#7de8ff"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Deep dark background -->
  <rect width="32" height="32" rx="7" fill="#060612"/>
  <!-- Subtle cyan haze behind text -->
  <ellipse cx="16" cy="17" rx="11" ry="7" fill="#00d4ff" opacity="0.07"/>
  <!-- ÄR with top-white to cyan gradient + glow -->
  <text x="16" y="22"
    font-family="'Arial Black', Impact, sans-serif"
    font-size="15" font-weight="900"
    fill="url(#g)"
    text-anchor="middle"
    filter="url(#glow)">ÄR</text>
  <!-- Cyan underline accent -->
  <line x1="8" y1="26.5" x2="24" y2="26.5" stroke="#00d4ff" stroke-width="1.5" stroke-linecap="round" opacity="0.75"/>
</svg>
